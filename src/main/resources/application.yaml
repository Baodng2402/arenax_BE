spring:
  application:
    name: arenax
  profiles:
    default: local
  jpa:
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

application:
  security:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
    jwt:
      expiration: ${JWT_ACCESS_TOKEN_EXPIRATION_MS:900000}
      refresh-token:
        expiration: ${JWT_REFRESH_TOKEN_EXPIRATION_MS:604800000}
