spring:
  application:
    name: arenax

  datasource:
    url: jdbc:postgresql://localhost:5432/arenax
    username: arenax
    password: arenax_dev_password
    driver-class-name: org.postgresql.Driver


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    open-in-view: false


  flyway:
    enabled: true
    locations: classpath:db/migration

application:
  security:
    jwt:
      secret: arenax-local-development-jwt-secret-key-please-change
      expiration: 900000
      refresh-token:
        expiration: 604800000
