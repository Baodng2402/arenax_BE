services:
  db:
    image: postgres:16-alpine
    container_name: arenax-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: arenax
      POSTGRES_USER: arenax
      POSTGRES_PASSWORD: arenax_dev_password
    volumes:
      - arenax_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arenax -d arenax"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  arenax_postgres_data:
